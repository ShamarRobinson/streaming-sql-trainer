<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Streaming SQL Trainer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15111f"/>
      <stop offset="1" stop-color="#0f0c17"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.85" cy="0.0" r="0.7">
      <stop offset="0" stop-color="#b07ee8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#b07ee8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.0" cy="1.0" r="0.7">
      <stop offset="0" stop-color="#39d3bb" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#39d3bb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glowA)"/>
  <rect width="1280" height="360" fill="url(#glowB)"/>
  <rect x="0.5" y="0.5" width="1279" height="359" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- left: identity -->
  <g transform="translate(72,104)">
    <rect x="0" y="0" rx="9" width="132" height="40" fill="#39d3bb"/>
    <text x="66" y="27" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="21" font-weight="700" fill="#06231f" text-anchor="middle" letter-spacing="-0.5">SELECT *</text>

    <text x="0" y="108" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#ECE7F2" letter-spacing="-1.5">Streaming SQL Trainer</text>
    <text x="2" y="152" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="19" fill="#988cab">48 live exercises · write real SQL · graded in your browser</text>

    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="15" font-weight="700">
      <rect x="0" y="178" rx="6" width="118" height="32" fill="#1c1626" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="59" y="199" fill="#39d3bb" text-anchor="middle">Basic</text>
      <rect x="130" y="178" rx="6" width="158" height="32" fill="#1c1626" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="209" y="199" fill="#f5b454" text-anchor="middle">Intermediate</text>
      <rect x="300" y="178" rx="6" width="140" height="32" fill="#1c1626" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="370" y="199" fill="#b07ee8" text-anchor="middle">Advanced</text>
      <rect x="452" y="178" rx="6" width="172" height="32" fill="#1c1626" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="538" y="199" fill="#ff7d92" text-anchor="middle">Expert · FAANG</text>
    </g>
  </g>

  <!-- right: faux query console -->
  <g transform="translate(816,70)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16.5">
    <rect x="0" y="0" rx="14" width="392" height="220" fill="#0f0c17" stroke="#ffffff" stroke-opacity="0.14"/>
    <g transform="translate(18,20)">
      <circle cx="6" cy="6" r="6" fill="#ff5f57"/>
      <circle cx="26" cy="6" r="6" fill="#febc2e"/>
      <circle cx="46" cy="6" r="6" fill="#28c840"/>
      <text x="280" y="11" fill="#6c6280" font-size="12" text-anchor="end">training.db</text>
    </g>
    <g transform="translate(22,66)">
      <text y="0" fill="#b07ee8">SELECT <tspan fill="#ECE7F2">cell, AVG(converted)</tspan></text>
      <text y="28" fill="#988cab">  AS conv_rate</text>
      <text y="56" fill="#b07ee8">FROM <tspan fill="#ECE7F2">experiments</tspan></text>
      <text y="84" fill="#b07ee8">WHERE <tspan fill="#ECE7F2">test_name =</tspan> <tspan fill="#39d3bb">'faster_start'</tspan></text>
      <text y="112" fill="#b07ee8">GROUP BY <tspan fill="#ECE7F2">cell;</tspan></text>
      <text y="146" fill="#39d3bb">✓ Correct · matches expected output</text>
    </g>
  </g>
</svg>
